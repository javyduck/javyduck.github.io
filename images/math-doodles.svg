<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Georgia, 'Times New Roman', serif">
  <!-- Faint hand-sketched mathematics, drawn in warm ink on parchment.
       Every group keeps opacity low so page content stays legible. -->
  <g stroke="#57503e" fill="none" stroke-width="0.9">

    <!-- A. complex plane, top-left -->
    <g opacity="0.11">
      <line x1="60" y1="175" x2="310" y2="175"/>
      <line x1="185" y1="55" x2="185" y2="295"/>
      <path d="M 310 175 l -9 -3.5 v 7 z" fill="#57503e"/>
      <path d="M 185 55 l -3.5 9 h 7 z" fill="#57503e"/>
      <circle cx="185" cy="175" r="72"/>
      <line x1="185" y1="175" x2="238" y2="124"/>
      <path d="M 238 124 l -8.5 1.5 4.5 6.5 z" fill="#57503e"/>
      <path d="M 208 175 A 23 23 0 0 0 201 159"/>
    </g>
    <g fill="#57503e" stroke="none" opacity="0.13" font-size="15" font-style="italic">
      <text x="163" y="48">Im</text>
      <text x="320" y="180">Re</text>
      <text x="212" y="168">θ</text>
      <text x="246" y="116">z = re<tspan font-size="10" dy="-6">iθ</tspan></text>
      <text x="172" y="193" font-style="normal">0</text>
    </g>

    <!-- B. sphere with equator + gravitation, top-right -->
    <g opacity="0.10">
      <circle cx="1360" cy="170" r="80"/>
      <ellipse cx="1360" cy="170" rx="80" ry="24" stroke-dasharray="4 5"/>
      <circle cx="1360" cy="170" r="2.4" fill="#57503e"/>
      <line x1="1360" y1="170" x2="1424" y2="122"/>
      <circle cx="1424" cy="122" r="2" fill="#57503e"/>
    </g>
    <g fill="#57503e" stroke="none" opacity="0.13" font-size="14" font-style="italic">
      <text x="1390" y="152">r</text>
      <text x="1432" y="116">m</text>
      <text x="1344" y="196">M</text>
      <text x="1290" y="290">F = GMm / r²</text>
    </g>

    <!-- C. Maxwell equations, mid-left -->
    <g fill="#57503e" stroke="none" opacity="0.12" font-size="15" font-style="italic">
      <text x="80" y="480">∇ · E = ρ/ε₀</text>
      <text x="80" y="514">∇ · B = 0</text>
      <text x="80" y="548">∇ × E = −∂B/∂t</text>
      <text x="80" y="582">∇ × B = μ₀J + μ₀ε₀ ∂E/∂t</text>
    </g>

    <!-- D. Euler identity, center -->
    <g fill="#57503e" stroke="none" opacity="0.12" font-size="30" font-style="italic">
      <text x="700" y="512">e<tspan font-size="19" dy="-11">iπ</tspan><tspan dy="11"> + 1 = 0</tspan></text>
    </g>

    <!-- E. Fourier inversion, mid-right -->
    <g fill="#57503e" stroke="none" opacity="0.12" font-size="16" font-style="italic">
      <text x="1130" y="600">f(x) = ∫ f̂(ξ) e<tspan font-size="11" dy="-7">2πiξx</tspan><tspan dy="7"> dξ</tspan></text>
    </g>

    <!-- F. light cone, bottom-left -->
    <g opacity="0.10">
      <line x1="200" y1="700" x2="200" y2="960"/>
      <path d="M 200 700 l -3.5 9 h 7 z" fill="#57503e"/>
      <line x1="90" y1="830" x2="330" y2="830"/>
      <path d="M 330 830 l -9 -3.5 v 7 z" fill="#57503e"/>
      <path d="M 200 830 L 118 738 M 200 830 L 282 738"/>
      <ellipse cx="200" cy="738" rx="82" ry="18"/>
      <path d="M 200 830 L 130 918 M 200 830 L 270 918"/>
      <ellipse cx="200" cy="918" rx="70" ry="15" stroke-dasharray="4 5"/>
    </g>
    <g fill="#57503e" stroke="none" opacity="0.13" font-size="14" font-style="italic">
      <text x="180" y="694">ct</text>
      <text x="338" y="835">x</text>
    </g>

    <!-- G. wireframe icosahedron, bottom-right -->
    <g opacity="0.10">
      <path d="M 1430 780 L 1499 820 L 1499 900 L 1430 940 L 1361 900 L 1361 820 Z"/>
      <path d="M 1430 780 L 1430 848 M 1499 820 L 1430 848 M 1361 820 L 1430 848"/>
      <path d="M 1430 848 L 1430 940 M 1430 848 L 1499 900 M 1430 848 L 1361 900" stroke-dasharray="4 4"/>
    </g>

    <!-- H. domain blob, top-center -->
    <g opacity="0.10">
      <path d="M 700 90 C 740 68 800 72 826 96 C 852 120 844 152 812 166 C 780 180 724 182 696 160 C 668 138 668 108 700 90 Z"/>
    </g>
    <g fill="#57503e" stroke="none" opacity="0.13" font-size="16" font-style="italic">
      <text x="752" y="136">Ω</text>
      <text x="842" y="86">∂Ω</text>
      <text x="700" y="226">∇ · F dV = ∮ F · n dS</text>
    </g>

    <!-- I. power series, bottom-center -->
    <g fill="#57503e" stroke="none" opacity="0.12" font-size="16" font-style="italic">
      <text x="620" y="900">f(x) = Σ aₙ (x − x₀)ⁿ</text>
    </g>

    <!-- J. uncertainty, upper-mid-left -->
    <g fill="#57503e" stroke="none" opacity="0.11" font-size="15" font-style="italic">
      <text x="420" y="330">Δx Δp ≥ ħ/2</text>
    </g>

    <!-- K. residue theorem, right of center-bottom -->
    <g fill="#57503e" stroke="none" opacity="0.11" font-size="15" font-style="italic">
      <text x="1000" y="860">∮ f(z) dz = 2πi Σ Res(f, zₖ)</text>
    </g>

    <!-- sweeping faint curves -->
    <g opacity="0.06">
      <path d="M -40 620 C 300 480 520 760 830 640 C 1100 540 1260 700 1660 560"/>
      <path d="M 380 -30 C 460 220 300 380 520 520"/>
      <path d="M 1120 1030 C 1180 820 1420 760 1560 640" stroke-dasharray="1 7"/>
    </g>

    <!-- scattered stars and dots -->
    <g opacity="0.13" stroke-width="0.8">
      <path d="M 520 120 v 12 M 514 126 h 12"/>
      <path d="M 1180 340 v 10 M 1175 345 h 10"/>
      <path d="M 90 340 v 10 M 85 345 h 10"/>
      <path d="M 1540 460 v 12 M 1534 466 h 12"/>
      <path d="M 950 300 v 8 M 946 304 h 8"/>
      <path d="M 640 760 v 8 M 636 764 h 8"/>
    </g>
    <g fill="#57503e" stroke="none" opacity="0.10">
      <circle cx="450" cy="220" r="1.6"/><circle cx="600" cy="380" r="1.3"/>
      <circle cx="1050" cy="180" r="1.6"/><circle cx="1250" cy="470" r="1.3"/>
      <circle cx="330" cy="620" r="1.6"/><circle cx="880" cy="720" r="1.3"/>
      <circle cx="1470" cy="620" r="1.6"/><circle cx="740" cy="330" r="1.3"/>
      <circle cx="160" cy="640" r="1.3"/><circle cx="1330" cy="720" r="1.6"/>
      <circle cx="560" cy="960" r="1.6"/><circle cx="1080" cy="950" r="1.3"/>
    </g>
  </g>
</svg>
