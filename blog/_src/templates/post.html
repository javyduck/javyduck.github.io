<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title$ | Jiawei Zhang</title>
$if(description)$<meta name="description" content="$description$">$endif$
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍪</text></svg>">
<link rel="stylesheet" href="../../assets/blog.css">
<script src="../../assets/blog.js"></script>
<script src="../../assets/mathjax-config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-title" href="../../">Jiawei Zhang<span style="color:var(--accent)">&nbsp;· Blog</span></a>
    <nav class="site-nav">
      <a href="../../">Posts</a>
      <a href="https://javyduck.github.io/">About</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">☾</button>
    </nav>
  </div>
</header>

<div class="post-wrap">
  <main class="post-main">
    <header class="post-header">
      <h1 class="post-title">$title$</h1>
      <div class="post-meta">
        <span>$displaydate$</span>
        <span>·</span>
        <span class="tag">$category$</span>
        $if(readingtime)$<span>·</span><span>$readingtime$ min read</span>$endif$
        <span id="busuanzi_container_page_pv" style="display:none">·
          <span id="busuanzi_value_page_pv"></span> views</span>
      </div>
    </header>

    <article class="post-content">
$body$
    </article>

    <nav class="post-nav-bottom">
      <a href="../../">← Back to all posts</a>
    </nav>
  </main>

  $if(table-of-contents)$
  <aside class="toc-sidebar">
    <div class="toc-sidebar-title">Contents</div>
    $table-of-contents$
  </aside>
  $endif$
</div>

<footer class="site-footer">
  © 2026 Jiawei Zhang · <a href="https://javyduck.github.io/">javyduck.github.io</a>
</footer>

</body>
</html>
